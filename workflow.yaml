version: "1"
nodes:
  - id: rename-hooks
    name: Rename wagmi v1 hooks to v2
    type: automatic
    steps:
      - name: "Rename hooks"
        js-ast-grep:
          js_file: "jssg/rename-hooks.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: rename-connectors
    name: Rename connectors from classes to functions
    type: automatic
    steps:
      - name: "Rename connectors"
        js-ast-grep:
          js_file: "jssg/rename-connectors.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-imports
    name: Fix import paths
    type: automatic
    steps:
      - name: "Fix imports"
        js-ast-grep:
          js_file: "jssg/fix-imports.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-use-network
    name: Replace useNetwork with useAccount and useConfig
    type: automatic
    steps:
      - name: "Fix useNetwork"
        js-ast-grep:
          js_file: "jssg/fix-use-network.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-tanstack-query
    name: Move TanStack Query params into query object
    type: automatic
    steps:
      - name: "Fix TanStack Query"
        js-ast-grep:
          js_file: "jssg/fix-tanstack-query.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-account-effect
    name: Move callbacks into useAccountEffect
    type: automatic
    steps:
      - name: "Fix account effect"
        js-ast-grep:
          js_file: "jssg/fix-account-effect.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-create-config
    name: Fix createConfig and remove configureChains
    type: automatic
    steps:
      - name: "Fix createConfig"
        js-ast-grep:
          js_file: "jssg/fix-create-config.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: fix-prepare-hooks
    name: Replace prepare hooks with simulate and estimate
    type: automatic
    steps:
      - name: "Fix prepare hooks"
        js-ast-grep:
          js_file: "jssg/fix-prepare-hooks.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"

  - id: ai-cleanup
    name: AI cleanup for edge cases
    type: automatic
    depends_on:
      - fix-prepare-hooks
    steps:
      - name: "AI handles remaining edge cases"
        ai:
          prompt: |
            You are migrating a codebase from wagmi v1 to wagmi v2.
            The deterministic codemods have already run.
            Now handle these remaining edge cases:

            1. useBalance({ token: '0x...' }) -> replace with useReadContracts with ERC20 ABI
            2. useToken({ address }) -> replace with useReadContracts (name, symbol, decimals, totalSupply)
            3. Any remaining useNetwork() calls not yet replaced
            4. Add QueryClientProvider from @tanstack/react-query to app root if missing
            5. Fix any broken imports

            Make all changes directly. Add TODO comments where manual review is needed.
