version: "1"
nodes:
  - id: rename-hooks
    name: Rename wagmi v1 hooks to v2
    type: automatic
    steps:
      - name: "Rename hooks"
        run: "npx jscodeshift -t transforms/rename-hooks.ts --parser=tsx --extensions=ts,tsx ."

  - id: rename-connectors
    name: Rename connectors
    type: automatic
    steps:
      - name: "Rename connectors"
        run: "npx jscodeshift -t transforms/rename-connectors.ts --parser=tsx --extensions=ts,tsx ."

  - id: fix-imports
